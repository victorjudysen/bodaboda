<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rider Dashboard - BodaConnect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-page">
  <header class="header">
    <span class="icon" aria-label="motorcycle">🛵</span>
    <span class="logo">BodaConnect</span>
  </header>
  <main class="container">
    <h1>Rider Dashboard</h1>
    <div id="dashboard-status"></div>
    <div style="margin-bottom:16px;">
      <strong>Name:</strong> <span id="rider-name">-</span>
    </div>
    <h2>Assigned Trips</h2>
    <ul class="trips-list" id="trips-list"></ul>
    <div style="margin-top:24px;">
      <a href="index.html" style="color:var(--accent); text-decoration:none;">&larr; Back to Home</a>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
