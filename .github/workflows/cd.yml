name: CD — Deploy (Staging → Production)

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [main]

jobs:
  # ── STAGING ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push — staging tag
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:${{ github.sha }}

      - name: Verify staging image is available
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:staging
          echo "Staging image verified: bodaboda-backend:staging"

      - name: Simulate staging health check
        run: |
          docker network create staging-net

          docker run -d --name staging-mqtt \
            --network staging-net \
            -v "${{ github.workspace }}/monitoring/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2

          docker run -d --name staging-test \
            --network staging-net \
            -e DB_PATH=/tmp/test.db \
            -e MQTT_ENABLED=true \
            -e MQTT_HOST=staging-mqtt \
            -e MQTT_PORT=1883 \
            -p 5000:5000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:staging

          sleep 8
          curl --fail http://localhost:5000/api/health || exit 1

          for i in $(seq 1 20); do
            if docker logs staging-test 2>&1 | grep -q "MQTT subscribed to rides/requests"; then
              echo "Staging backend connected to MQTT broker"
              break
            fi
            sleep 2
          done

          docker logs staging-test 2>&1 | grep -q "MQTT subscribed to rides/requests"
          echo "Staging health check passed"

      - name: Cleanup staging test containers
        if: always()
        run: |
          docker rm -f staging-test staging-mqtt || true
          docker network rm staging-net || true

  # ── APPROVAL GATE ──────────────────────────────────────────────────────────
  # GitHub Environment "production" must have a required reviewer configured
  # in Settings → Environments → production → Required reviewers.
  # The workflow will pause here and wait for a Release Manager to approve.
  approve-production:
    name: Approval Gate (Release Manager)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # <-- protected environment — triggers manual approval

    steps:
      - name: Approval received
        run: echo "Production deployment approved by Release Manager."

  # ── PRODUCTION ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approve-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push — production tags (latest + version)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:v1
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:${{ github.sha }}

      - name: Confirm production deployment
        run: |
          echo "Production image pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:v1"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:${{ github.sha }}"
          echo "System is live in production."
