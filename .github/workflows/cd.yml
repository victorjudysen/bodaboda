name: CD — Deploy (Staging → Production)

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [main]

jobs:
  # ── STAGING ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push — staging tag
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:${{ github.sha }}

      - name: Verify staging image is available
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:staging
          echo "Staging image verified: bodaboda-backend:staging"

      - name: Simulate staging health check
        run: |
          docker network create staging-net

          docker run -d --name staging-mqtt \
            --network staging-net \
            -v "${{ github.workspace }}/monitoring/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2

          docker run -d --name staging-test \
            --network staging-net \
            -e DB_PATH=/tmp/test.db \
            -e MQTT_ENABLED=true \
            -e MQTT_HOST=staging-mqtt \
            -e MQTT_PORT=1883 \
            -p 5000:5000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:staging

          sleep 8
          curl --fail http://localhost:5000/api/health || exit 1

          for i in $(seq 1 20); do
            if docker logs staging-test 2>&1 | grep -q "MQTT subscribed to rides/requests"; then
              echo "Staging backend connected to MQTT broker"
              break
            fi
            sleep 2
          done

          docker logs staging-test 2>&1 | grep -q "MQTT subscribed to rides/requests"
          echo "Staging health check passed"

      - name: Cleanup staging test containers
        if: always()
        run: |
          docker rm -f staging-test staging-mqtt || true
          docker network rm staging-net || true

      # ── Improvement #2: Failure Notification ──────────────────────────────
      - name: Notify on staging failure
        if: failure()
        run: |
          echo "::error::Staging deployment FAILED for commit ${{ github.sha }}"
          echo "::error::Branch: ${{ github.ref_name }}"
          echo "::error::Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Optional Slack notification (set SLACK_WEBHOOK_URL secret to enable):
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \":red_circle: *BodaBoda CD — Staging FAILED*\",
                \"attachments\": [{
                  \"color\": \"danger\",
                  \"fields\": [
                    {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                    {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                    {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}
                  ]
                }]
              }"
          fi

  # ── APPROVAL GATE ──────────────────────────────────────────────────────────
  approve-production:
    name: Approval Gate (Release Manager)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Approval received
        run: echo "Production deployment approved by Release Manager."

  # ── PRODUCTION ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approve-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push — production tags (latest + version)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:v${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:${{ github.sha }}

      - name: Save current version for rollback reference
        run: |
          echo "v${{ github.run_number }}" > .last-deployed-version
          echo "Deployed version: v${{ github.run_number }} (run #${{ github.run_number }})"
          echo "SHA: ${{ github.sha }}"

      - name: Confirm production deployment
        run: |
          echo "=============================================="
          echo "  Production Deployment Complete"
          echo "=============================================="
          echo "  Image: ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend"
          echo "  Tags : latest  v${{ github.run_number }}  ${{ github.sha }}"
          echo "  To rollback, run the 'Rollback' workflow"
          echo "  with tag: v${{ github.run_number }}"
          echo "=============================================="

      # ── Improvement #2: Success Notification ──────────────────────────────
      - name: Notify on production success
        if: success()
        run: |
          echo "::notice::Production deployed successfully — v${{ github.run_number }}"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \":white_check_mark: *BodaBoda CD — Production deployed v${{ github.run_number }}*\",
                \"attachments\": [{
                  \"color\": \"good\",
                  \"fields\": [
                    {\"title\": \"Version\", \"value\": \"v${{ github.run_number }}\", \"short\": true},
                    {\"title\": \"SHA\", \"value\": \"${{ github.sha }}\", \"short\": true}
                  ]
                }]
              }"
          fi

      - name: Notify on production failure
        if: failure()
        run: |
          echo "::error::Production deployment FAILED — initiating rollback recommendation"
          echo "::error::Run the Rollback workflow to revert to the previous version"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \":rotating_light: *BodaBoda CD — Production FAILED. Run Rollback workflow.*\",
                \"attachments\": [{\"color\": \"danger\"}]
              }"
          fi
