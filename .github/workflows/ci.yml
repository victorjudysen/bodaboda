name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: |
            bodaboda-backend:latest
            bodaboda-backend:${{ github.sha }}

  mqtt-smoke:
    name: MQTT Integration Smoke Test
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start MQTT-backed stack
        run: |
          docker compose up -d --build mqtt backend

      - name: Wait for MQTT connection
        run: |
          for i in $(seq 1 30); do
            if docker compose logs backend 2>&1 | grep -q "MQTT subscribed to rides/requests"; then
              echo "Backend connected to MQTT broker"
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run publish/receive smoke test
        run: |
          BASE_URL=http://localhost:5001 python scripts/mqtt_smoke_test.py

      - name: Confirm backend published the trip to MQTT
        run: |
          docker compose logs backend 2>&1 | grep -q "Published ride request"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans
