name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # ── Improvement #1: Test Coverage Reports ────────────────────────────
      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --cov-fail-under=60

      - name: Upload coverage XML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-xml
          path: coverage.xml

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: coverage-html/

      - name: Print coverage summary
        run: |
          echo "========================================"
          echo "  Test Coverage Summary"
          echo "========================================"
          python -m coverage report --rcfile=.coveragerc 2>/dev/null || \
          python -m coverage report 2>/dev/null || \
          echo "Coverage XML saved as artifact above"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Record build start time
        id: build-start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: |
            bodaboda-backend:latest
            bodaboda-backend:${{ github.sha }}

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: |
            bodaboda-frontend:latest
            bodaboda-frontend:${{ github.sha }}

      - name: Report build duration
        run: |
          END=$(date +%s)
          START=${{ steps.build-start.outputs.start }}
          DURATION=$((END - START))
          echo "========================================"
          echo "  Docker Build Duration: ${DURATION}s"
          echo "  Commit: ${{ github.sha }}"
          echo "========================================"

  mqtt-smoke:
    name: MQTT Integration Smoke Test
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create backend env file
        run: |
          cat > backend/.env <<'EOF'
          DB_PATH=/app/data/bodaboda.db
          FLASK_DEBUG=false
          EOF

      - name: Start MQTT-backed stack
        run: |
          docker compose up -d --build mqtt backend

      - name: Wait for MQTT connection
        run: |
          for i in $(seq 1 30); do
            if docker compose logs backend 2>&1 | grep -q "MQTT subscribed to rides/requests"; then
              echo "Backend connected to MQTT broker"
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Run publish/receive smoke test
        run: |
          pip install -r backend/requirements.txt
          BASE_URL=http://localhost:5001 python scripts/mqtt_smoke_test.py

      - name: Confirm backend published the trip to MQTT
        run: |
          docker compose logs backend 2>&1 | grep -q "Published ride request"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans
